services:
  db:
    container_name: db
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb

    healthcheck:
        test: ["CMD-SHELL", "pg_isready -U user -d mydb"]
        interval: 10s
        timeout: 5s
        retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data

    networks:
      - server-network

  backend:
    container_name: backend
    build: ./backend-events

    ports:
      - "3000:3000"

    networks:
      - server-network
    env_file: ./backend-events/.env

    depends_on:
      db:
        condition: service_healthy

  frontend:
    container_name: frontend
    domainname: manuel.local
    build: ./detector-somnolencia-main

    ports:
      - "80:80"

    networks:
      - server-network

    depends_on:
      backend:
        condition: service_started

networks:
  server-network:
    name: manuel
volumes:
  db_data:
    driver: local